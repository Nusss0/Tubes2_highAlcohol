services:
  backend:
    build:
      context: ./src
      dockerfile: backend/Dockerfile
    container_name: tubes2-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: tubes2-frontend
    depends_on:
      - backend
    ports:
      - "80:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
